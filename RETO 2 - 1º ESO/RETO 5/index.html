<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permisos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --surface: #ffffff;
      --text: #18201d;
      --muted: #66706b;
      --line: #dfe5dd;
      --accent: #236b5b;
      --accent-soft: #e3f2ed;
      --blue: #dbeafe;
      --violet: #ede9fe;
      --amber: #fef3c7;
      --rose: #ffe4e6;
      --green: #dcfce7;
      --sky: #e0f2fe;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .hint {
      max-width: 380px;
      margin: 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      line-height: 1.45;
    }

    .hint strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 20px;
      align-items: start;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .app-button {
      display: grid;
      min-height: 150px;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .app-button:hover,
    .app-button:focus-visible {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent), var(--line) 35%);
      box-shadow: 0 12px 24px rgba(24, 32, 29, 0.08);
      outline: none;
    }

    .app-button[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .icon {
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      border-radius: 8px;
      font-size: 1.55rem;
    }

    .app-name {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .detail {
      position: sticky;
      top: 24px;
      min-height: 360px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .detail h2 {
      margin: 0 0 22px;
      font-size: 1.6rem;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .permissions-title {
      margin: 0 0 12px;
      font-weight: 750;
    }

    .permissions {
      display: grid;
      gap: 10px;
      margin: 0 0 20px 0;
      padding: 0;
      list-style: none;
    }

    .permissions li {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
    }

    .check {
      display: grid;
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
    }

    .flag-zone {
      margin-top: 20px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--bg);
      font-family: monospace;
      font-size: 0.95rem;
      text-align: center;
      word-break: break-all;
    }

    @media (max-width: 820px) {
      .shell {
        width: min(100% - 24px, 620px);
        padding: 28px 0;
      }

      .topbar,
      .layout {
        display: grid;
      }

      .apps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail {
        position: static;
      }
    }

    @media (max-width: 480px) {
      .apps {
        grid-template-columns: 1fr;
      }

      .app-button {
        min-height: 118px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-labelledby="page-title">
      <h1 id="page-title">P&aacute;gina principal</h1>
      <p class="hint">
        <strong>Consejo de seguridad</strong>
        Antes de aceptar los permisos de una aplicaci&oacute;n, piensa si realmente son necesarios para su funci&oacute;n.
      </p>
    </section>

    <section class="layout">
      <div class="apps" id="apps" aria-label="Aplicaciones"></div>

      <aside class="detail" aria-live="polite" aria-labelledby="detail-title">
        <h2 id="detail-title"></h2>
        <p class="permissions-title">Permisos:</p>
        <ul class="permissions" id="permissions"></ul>
        <div class="flag-zone" id="flag-box"></div>
      </aside>
    </section>
  </main>

  <script>
    const apps = [
      { name: "C\u00e1mara", icon: "\ud83d\udcf7", tone: "var(--rose)", permissions: ["C\u00e1mara", "Micr\u00f3fono", "Almacenamiento"], flag: "FLAG{FOTO}" },
      { name: "Mapas", icon: "\ud83d\uddfa\ufe0f", tone: "var(--green)", permissions: ["Ubicaci\u00f3n", "Almacenamiento"], flag: "FLAG{GPS}" },
      { name: "M\u00fasica", icon: "\ud83c\udfb5", tone: "var(--blue)", permissions: ["Micr\u00f3fono", "Almacenamiento"], flag: "FLAG{AUDIO}" },
      { name: "Mensajer\u00eda", icon: "\ud83d\udcac", tone: "var(--violet)", permissions: ["Contactos", "C\u00e1mara", "Micr\u00f3fono", "Almacenamiento"], flag: "FLAG{CHAT}" },
      { name: "Tiempo", icon: "\ud83c\udf26\ufe0f", tone: "var(--sky)", permissions: ["Ubicaci\u00f3n"], flag: "FLAG{CLIMA}" },
      { name: "Notas", icon: "\ud83d\udcdd", tone: "var(--amber)", permissions: ["Contactos", "Almacenamiento"], flag: "FLAG{NOTAS}" }
    ];

    const appsNode = document.querySelector("#apps");
    const titleNode = document.querySelector("#detail-title");
    const permissionsNode = document.querySelector("#permissions");
    const flagBoxNode = document.querySelector("#flag-box");

    function selectApp(index) {
      const app = apps[index];
      titleNode.textContent = app.name;
      permissionsNode.replaceChildren(
        ...app.permissions.map((permission) => {
          const item = document.createElement("li");
          const check = document.createElement("span");
          check.className = "check";
          check.textContent = "\u2713";
          check.setAttribute("aria-hidden", "true");
          item.append(check, document.createTextNode(permission));
          return item;
        })
      );

      flagBoxNode.textContent = app.flag;

      document.querySelectorAll(".app-button").forEach((button, buttonIndex) => {
        button.setAttribute("aria-pressed", String(buttonIndex === index));
      });
    }

    apps.forEach((app, index) => {
      const button = document.createElement("button");
      button.className = "app-button";
      button.type = "button";
      button.setAttribute("aria-pressed", "false");
      button.addEventListener("click", () => selectApp(index));

      const icon = document.createElement("span");
      icon.className = "icon";
      icon.style.background = app.tone;
      icon.textContent = app.icon;
      icon.setAttribute("aria-hidden", "true");

      const name = document.createElement("p");
      name.className = "app-name";
      name.textContent = app.name;

      button.append(icon, name);
      appsNode.append(button);
    });

    selectApp(0);
  </script>
</body>
</html>
